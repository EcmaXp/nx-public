# https://herdr.dev/docs/configuration/

onboarding = false

[theme]
name = "kanagawa"
auto_switch = false
# dark_name = "catppuccin"
# light_name = "catppuccin-latte"

# [theme.custom]
# panel_bg = "reset"
# accent = "#f5c2e7"
# red = "#ff6188"
# green = "#a6e3a1"

[terminal]
# default_shell = ""
# shell_mode = "auto"
# new_cwd = "follow"

[update]
# channel = "stable"
# version_check = true
# manifest_check = true

[keys]
# prefix = "ctrl+b"
# help = "prefix+?"
settings = ["prefix+s", "cmd+comma"]
# detach = "prefix+q"
reload_config = ["prefix+shift+r", "cmd+shift+comma"]
open_notification_target = ["prefix+o", "cmd+j"]
workspace_picker = ["prefix+w", "cmd+k", "cmd+o", "cmd+shift+p"]
goto = ["prefix+g", "cmd+p"]
new_workspace = ["prefix+shift+n", "cmd+n"]
new_worktree = ["prefix+shift+g", "cmd+g"]
# open_worktree = ""
# remove_worktree = ""
rename_workspace = ["prefix+shift+w", "cmd+shift+r"]
close_workspace = ["prefix+shift+d", "cmd+alt+w"]
previous_workspace = ["prefix+up", "ctrl+shift+up"]
next_workspace = ["prefix+down", "ctrl+shift+down"]
previous_agent = ["prefix+comma", "ctrl+up"]
next_agent = ["prefix+period", "ctrl+down"]
# focus_agent = ""
# remote_image_paste = "ctrl+v"
new_tab = ["prefix+c", "cmd+t"]
rename_tab = ["prefix+shift+t", "cmd+r"]
previous_tab = ["prefix+p", "ctrl+left"]
next_tab = ["prefix+n", "ctrl+right"]
switch_tab = ["prefix+1..9", "cmd+1..9"]
# switch_workspace = ""
close_tab = ["prefix+shift+x", "cmd+shift+w"]
rename_pane = ["prefix+shift+p", "cmd+alt+r"]
edit_scrollback = ["prefix+e", "cmd+e"]
focus_pane_left = ["prefix+h", "ctrl+alt+left"]
focus_pane_down = ["prefix+j", "ctrl+alt+down"]
focus_pane_up = ["prefix+k", "ctrl+alt+up"]
focus_pane_right = ["prefix+l", "ctrl+alt+right"]
# cycle_pane_next = "prefix+tab"
# cycle_pane_previous = "prefix+shift+tab"
# last_pane = ""
split_vertical = ["prefix+v", "cmd+d"]
split_horizontal = ["prefix+minus", "cmd+shift+d"]
close_pane = ["prefix+x"]
zoom = ["prefix+z", "ctrl+enter"]
resize_mode = ["prefix+r", "ctrl+alt+enter"]
toggle_sidebar = ["prefix+b", "cmd+b"]
# navigate_workspace_up = "up"
# navigate_workspace_down = "down"
# navigate_pane_left = "h"
# navigate_pane_down = "j"
# navigate_pane_up = "k"
# navigate_pane_right = "l"

